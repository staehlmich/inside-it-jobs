name: Extract Weekly Jobs

on:
  schedule:
    # Runs at 15:15 UTC (approx 16:15/17:15 local time)
    # on Thursdays (4) and Fridays (5)
    - cron: '15 15 * * 4,5'
  workflow_dispatch: # Still allows manual runs anytime

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest test_extract_jobs.py

      - name: Run extraction
        run: python extract_jobs.py