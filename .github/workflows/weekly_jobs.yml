name: Extract Weekly Jobs

on:
  schedule:
    # Runs at 06:00 UTC (approx 07:00/08:00 AM local time)
    # on Thursdays (4) and Fridays (5)
    - cron: '0 6 * * 4,5'
  workflow_dispatch: # Still allows manual runs anytime

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests

      - name: Run extraction
        run: python extract_jobs.py