name: Extract Weekly Jobs

on:
  schedule:
    # Runs at 15:15, 15:30, 15:45 and 16:00 Swiss Time year-round.
    # The cron triggers in both possible UTC windows (13:xx and 14:xx).
    # The Python script internally filters for the correct Swiss hour.
    - cron: '15,30,45 13,14 * * 4,5'
    - cron: '0 14,15 * * 4,5'
  workflow_dispatch: # Still allows manual runs anytime

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest test_extract_jobs.py

      - name: Run extraction
        run: python extract_jobs.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "Update README with latest job listings" || echo "No changes to commit"
          git push